<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.name }} — Stripe Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 480px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .product-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .product-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: moveBackground 20s linear infinite;
        }
        
        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, 20px); }
        }
        
        .product-icon {
            font-size: 64px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
            position: relative;
            z-index: 1;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .product-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        
        .product-description {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }
        
        .product-body {
            padding: 30px;
        }
        
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .feature-tag {
            background: #f3f4f6;
            color: #4b5563;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .price-section {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            border-radius: 16px;
        }
        
        .price-label {
            font-size: 14px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .price-value {
            font-size: 42px;
            font-weight: 800;
            color: #1f2937;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .currency-badge {
            display: inline-block;
            margin-left: 10px;
            font-size: 14px;
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 20px;
            color: #667eea;
            font-weight: 600;
        }
        
        .buy-button {
            width: 100%;
            padding: 18px 30px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .buy-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        .buy-button:active {
            transform: translateY(0);
        }
        
        .buy-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .buy-button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .buy-button:active::after {
            width: 300px;
            height: 300px;
        }
        
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        .buy-button.loading .spinner {
            display: inline-block;
        }
        
        .buy-button.loading .btn-text {
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            margin-top: 15px;
            padding: 12px 16px;
            background: #fef2f2;
            color: #dc2626;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            animation: shake 0.5s ease-in-out;
        }
        
        .error-message.show {
            display: block;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .security-info {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .security-info svg {
            width: 16px;
            height: 16px;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #667eea;
        }
        
        .payment-methods {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            opacity: 0.6;
        }
        
        .payment-icon {
            width: 40px;
            height: 26px;
            background: #f3f4f6;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="product-card">
        <div class="product-header">
            <div class="product-icon">
                {% if item.currency == 'usd' %}🇺🇸{% else %}🇪🇺{% endif %}
            </div>
            <h1 class="product-name">{{ item.name }}</h1>
            <p class="product-description">{{ item.description }}</p>
        </div>
        
        <div class="product-body">
            <div class="features">
                <div class="feature-tag">✓ Мгновенная доставка</div>
                <div class="feature-tag">✓ Гарантия качества</div>
                <div class="feature-tag">✓ Поддержка 24/7</div>
            </div>
            
            <div class="price-section">
                <div class="price-label">Цена</div>
                <div class="price-value">
                    {{ item.get_display_price }}
                    <span class="currency-badge">{{ item.currency|upper }}</span>
                </div>
            </div>
            
            <button id="buy-button" class="buy-button">
                <span class="spinner"></span>
                <span class="btn-text">Купить сейчас</span>
            </button>
            
            <div id="error-message" class="error-message"></div>
            
            <div class="security-info">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path>
                </svg>
                Безопасная оплата через Stripe SSL
            </div>
            
            <div class="payment-methods">
                <div class="payment-icon">VISA</div>
                <div class="payment-icon">MC</div>
                <div class="payment-icon">AMEX</div>
            </div>
            
            <a href="/" class="back-link">← Вернуться к товарам</a>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripePublicKey = '{{ stripe_public_key }}';
        const itemId = {{ item.id }};
        const stripe = Stripe(stripePublicKey);
        const buyButton = document.getElementById('buy-button');
        const errorDiv = document.getElementById('error-message');
        
        buyButton.addEventListener('click', async function() {
            buyButton.disabled = true;
            buyButton.classList.add('loading');
            errorDiv.classList.remove('show');
            
            try {
                const response = await fetch(`/buy/${itemId}/`, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) {
                    throw new Error('Ошибка при создании сессии оплаты');
                }
                
                const data = await response.json();
                
                const result = await stripe.redirectToCheckout({
                    sessionId: data.session_id
                });
                
                if (result.error) {
                    throw new Error(result.error.message);
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = '❌ ' + error.message;
                errorDiv.classList.add('show');
                buyButton.disabled = false;
                buyButton.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
