<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата отменена — Stripe Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .cancel-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 480px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .cancel-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: popIn 0.5s ease-out 0.2s both;
        }
        
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .cancel-icon::after {
            content: '!';
            color: white;
            font-size: 50px;
            font-weight: bold;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease-out 0.3s both;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .subtitle {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out 0.4s both;
        }
        
        .info-box {
            background: #fffbeb;
            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
            animation: fadeIn 0.5s ease-out 0.5s both;
        }
        
        .info-box p {
            color: #92400e;
            font-size: 14px;
            margin: 0;
            line-height: 1.6;
        }
        
        .btn-primary {
            display: inline-block;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border: none;
            border-radius: 12px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            animation: fadeIn 0.5s ease-out 0.6s both;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
        }
        
        .help-text {
            margin-top: 20px;
            font-size: 14px;
            color: #9ca3af;
            animation: fadeIn 0.5s ease-out 0.7s both;
        }
        
        .help-text a {
            color: #f59e0b;
            text-decoration: none;
        }
        
        .help-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="cancel-card">
        <div class="cancel-icon"></div>
        <h1>Оплата отменена</h1>
        <p class="subtitle">Ничего страшного! Вы можете попробовать снова</p>
        
        <div class="info-box">
            <p>💡 <strong>Совет:</strong> Убедитесь, что данные карты введены правильно. Если проблема повторяется, попробуйте другую карту или способ оплаты.</p>
        </div>
        
        <a href="/" class="btn-primary">Вернуться к товарам</a>
        
        <p class="help-text">
            Нужна помощь? <a href="mailto:support@stripe-shop.com">Свяжитесь с нами</a>
        </p>
    </div>
</body>
</html>
